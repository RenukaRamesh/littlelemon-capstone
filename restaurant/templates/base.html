<!DOCTYPE html>
<html>
<head>
    <title>Little Lemon</title>
    <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;700&family=Karla:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Karla', sans-serif; }
        header { text-align: center; padding: 20px; }
        .logo-row { display: flex; justify-content: center; align-items: center; gap: 12px; }
        .logo-row h1 { font-family: 'Markazi Text', serif; font-size: 40px; letter-spacing: 4px; color: #495e57; }
        nav { background: #495e57; padding: 12px; text-align: center; }
        nav a { color: white; margin: 0 14px; text-decoration: none; font-weight: bold; }
        main { max-width: 900px; margin: 0 auto; padding: 20px; }
        footer { background: #eee; padding: 20px 40px; margin-top: 40px; text-align: center; }
        label { display:block; margin-top:15px; font-weight:bold; }
        input, select { padding:8px; width:100%; max-width:300px; margin-top:5px; }
        button { margin-top:20px; padding:10px 20px; background:#495e57; color:white; border:none; cursor:pointer; }
        .slot-booked { background: #ddd !important; color: #999; }
        .msg-success { color: green; font-weight: bold; margin-top: 15px; }
        .msg-error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-row">
            <svg width="45" height="45" viewBox="0 0 100 100">
                <ellipse cx="50" cy="55" rx="35" ry="40" fill="#495e57"/>
                <path d="M50 15 Q60 0 75 10 Q65 20 50 15" fill="#495e57"/>
            </svg>
            <h1>LITTLE LEMON</h1>
        </div>
    </header>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'menu' %}">Menu</a>
        <a href="{% url 'book' %}">Book</a>
        <a href="{% url 'reservations' %}">Reservations</a>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer>
        <span>Copyright Little Lemon</span>
    </footer>
</body>
</html>
